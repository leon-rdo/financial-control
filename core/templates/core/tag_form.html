<div class="modal modal-open" x-data="{ open: true }" x-show="open" @keydown.escape.window="open = false">
    <div class="modal-box max-w-lg">
        <div class="flex justify-between items-center mb-5">
            <h3 class="text-base font-semibold">
                {% if object.pk %}Editar Tag{% else %}Nova Tag{% endif %}
            </h3>
            <button @click="open = false" class="btn btn-ghost btn-xs btn-square">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <form
            hx-post="{% if object.pk %}{% url 'core:tag_update' object.pk %}{% else %}{% url 'core:tag_create' %}{% endif %}"
            hx-target="#tag-table"
            hx-swap="outerHTML"
            @htmx:after-request="if(event.detail.successful) { open = false; showToast('Tag salva com sucesso!'); }">

            {% csrf_token %}

            <div class="space-y-4">
                <!-- Name -->
                <div class="form-control">
                    <label class="text-[11px] font-medium text-base-content/40 uppercase tracking-wider mb-1 block">Nome *</label>
                    {{ form.name }}
                    {% if form.name.errors %}
                    <p class="text-xs text-error mt-1">{{ form.name.errors.0 }}</p>
                    {% endif %}
                </div>

                <!-- Color -->
                <div class="form-control">
                    <label class="text-[11px] font-medium text-base-content/40 uppercase tracking-wider mb-1 block">Cor (opcional)</label>
                    <div class="flex gap-2 items-center">
                        {{ form.color }}
                        <div
                            x-data="{ color: '{{ form.color.value|default:'#3b82f6' }}' }"
                            class="w-10 h-10 rounded border cursor-pointer"
                            :style="`background-color: ${color}`"
                            @click="$refs.colorInput.click()"
                            x-init="$watch('color', value => $refs.colorInput.value = value)">
                        </div>
                    </div>
                    {% if form.color.errors %}
                    <p class="text-xs text-error mt-1">{{ form.color.errors.0 }}</p>
                    {% endif %}
                    <p class="text-[11px] text-base-content/30 mt-1">Codigo hexadecimal (ex: #FF5733)</p>
                </div>
            </div>

            <div class="flex justify-end gap-2 mt-6">
                <button type="button" @click="open = false" class="btn btn-ghost btn-sm">Cancelar</button>
                <button type="submit" class="btn btn-neutral btn-sm">Salvar</button>
            </div>
        </form>
    </div>
    <div class="modal-backdrop" @click="open = false"></div>
</div>
